name: mordechaius_maximus
description: Mordechaius Maximus — Cloud Agents, Capabilities, Commissions.
publish_to: 'none'
version: 2.0.9+21

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # HTTP & auth
  dio: ^5.7.0

  # Secure storage
  flutter_secure_storage: ^9.2.2

  # Local storage & paths
  path_provider: ^2.1.4
  shared_preferences: ^2.3.3

  # UI & navigation
  url_launcher: ^6.3.1
  webview_flutter: ^4.10.0
  image_picker: ^1.1.2
  flutter_svg: ^2.0.10+1
  path: ^1.9.0
  open_file: ^3.5.0

  # App / package metadata (About screen, build label)
  package_info_plus: ^8.1.2

  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.1
  collection: ^1.18.0

  # Push notifications — run: flutter pub get
  firebase_core: ^3.8.1
  firebase_messaging: ^15.1.6
  flutter_local_notifications: ^18.0.1

  # Optional: token sync to Supabase (skip if not using)
  supabase_flutter: ^2.8.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.13
  json_serializable: ^6.8.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4

flutter:
  uses-material-design: true

  assets:
    - assets/animations/
    - assets/images/
    - assets/mm_logo.svg

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: assets/images/mm_icon_512.png
  adaptive_icon_background: "#0d0221"
  adaptive_icon_foreground: assets/images/mm_icon_512.png

flutter_native_splash:
  color: "#0d0221"
  image: assets/images/mm_icon_512.png
  android_gravity: center
  ios_content_mode: center
  android_12:
    color: "#0d0221"
    image: assets/images/mm_icon_512.png
