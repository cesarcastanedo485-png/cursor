# Analyze + test on every push/PR. Release APK/AAB: run locally with free disk (see docs/RELEASE_CHECKLIST.md).
name: Flutter CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  analyze-test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4

      - name: CI diagnostics (easy to spot in logs)
        shell: bash
        run: |
          set -euo pipefail
          echo "=========================================="
          echo "  Mordechaius Maximus — Flutter CI header"
          echo "=========================================="
          echo "PWD=$(pwd)"
          echo "Top-level files:"
          ls -la
          echo "--- pubspec version line ---"
          grep -E '^version:' pubspec.yaml || true
          echo "--- end header ---"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter toolchain
        run: |
          echo "=== flutter --version ==="
          flutter --version
          echo "=== dart --version ==="
          dart --version

      - name: Pub get
        run: flutter pub get

      - name: Analyze
        run: |
          echo "=== flutter analyze (fails this job on any issue) ==="
          flutter analyze
          echo "=== analyze OK ==="

      - name: Test
        run: |
          echo "=== flutter test ==="
          flutter test
          echo "=== tests OK ==="
