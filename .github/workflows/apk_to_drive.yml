name: Build APK and Upload to Google Drive

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-and-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Write Android signing files
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -n "${ANDROID_KEYSTORE_BASE64}" ] && [ -n "${ANDROID_KEYSTORE_PASSWORD}" ] && [ -n "${ANDROID_KEY_ALIAS}" ] && [ -n "${ANDROID_KEY_PASSWORD}" ]; then
            # Keep pipeline resilient: if signing setup fails, continue and let Gradle fallback to debug signing.
            if echo "${ANDROID_KEYSTORE_BASE64}" | base64 -d > android/upload-keystore.jks; then
              cat > android/key.properties <<EOF
              storePassword=${ANDROID_KEYSTORE_PASSWORD}
              keyPassword=${ANDROID_KEY_PASSWORD}
              keyAlias=${ANDROID_KEY_ALIAS}
              storeFile=upload-keystore.jks
              EOF
              echo "Release signing configured."
            else
              echo "Signing secret decode failed. Continuing without release keystore."
              rm -f android/upload-keystore.jks android/key.properties
            fi
          else
            echo "Signing secrets missing. Build may fallback to debug signing based on project config."
          fi

      - name: Flutter pub get
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Rename APK with commit SHA
        shell: bash
        run: |
          APK_PATH="build/app/outputs/flutter-apk/app-release.apk"
          DEST_PATH="build/app/outputs/flutter-apk/MordechaiusMaximus-${GITHUB_SHA::7}.apk"
          cp "${APK_PATH}" "${DEST_PATH}"
          echo "APK_PATH=${DEST_PATH}" >> "$GITHUB_ENV"

      - name: Upload artifact to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ github.sha }}
          path: ${{ env.APK_PATH }}
          if-no-files-found: error

      - name: "Upload APK to Google Drive (folder: APKS)"
        env:
          GDRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
          APK_PATH: ${{ env.APK_PATH }}
        run: |
          python -m pip install --upgrade pip
          python -m pip install google-api-python-client google-auth google-auth-httplib2
          python - <<'PY'
          import io
          import json
          import os
          from google.oauth2 import service_account
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload

          creds_json = os.environ.get("GDRIVE_SERVICE_ACCOUNT_JSON", "").strip()
          folder_id = os.environ.get("GDRIVE_FOLDER_ID", "").strip()
          apk_path = os.environ.get("APK_PATH", "").strip()

          if not creds_json:
              raise SystemExit("Missing secret: GDRIVE_SERVICE_ACCOUNT_JSON")
          if not folder_id:
              raise SystemExit("Missing secret: GDRIVE_FOLDER_ID (must be the APKS folder ID)")
          if not apk_path or not os.path.exists(apk_path):
              raise SystemExit(f"APK not found: {apk_path}")

          info = json.loads(creds_json)
          scopes = ["https://www.googleapis.com/auth/drive.file"]
          creds = service_account.Credentials.from_service_account_info(info, scopes=scopes)
          service = build("drive", "v3", credentials=creds)

          filename = os.path.basename(apk_path)
          file_metadata = {"name": filename, "parents": [folder_id]}
          media = MediaFileUpload(apk_path, mimetype="application/vnd.android.package-archive", resumable=True)

          created = service.files().create(
              body=file_metadata,
              media_body=media,
              fields="id,name,webViewLink,webContentLink"
          ).execute()

          print("Uploaded to Google Drive:")
          print(f"id={created.get('id')}")
          print(f"name={created.get('name')}")
          print(f"webViewLink={created.get('webViewLink')}")
          print(f"webContentLink={created.get('webContentLink')}")
          PY
