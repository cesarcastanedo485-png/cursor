name: Build APK and Upload to GitHub

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Write Android signing files
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -n "${ANDROID_KEYSTORE_BASE64}" ] && [ -n "${ANDROID_KEYSTORE_PASSWORD}" ] && [ -n "${ANDROID_KEY_ALIAS}" ] && [ -n "${ANDROID_KEY_PASSWORD}" ]; then
            # Keep pipeline resilient: if signing setup fails, continue and let Gradle fallback to debug signing.
            if echo "${ANDROID_KEYSTORE_BASE64}" | base64 -d > android/upload-keystore.jks; then
              printf "storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=upload-keystore.jks\n" \
                "${ANDROID_KEYSTORE_PASSWORD}" \
                "${ANDROID_KEY_PASSWORD}" \
                "${ANDROID_KEY_ALIAS}" > android/key.properties
              echo "Release signing configured."
            else
              echo "Signing secret decode failed. Continuing without release keystore."
              rm -f android/upload-keystore.jks android/key.properties
            fi
          else
            echo "Signing secrets missing. Build may fallback to debug signing based on project config."
          fi

      - name: Flutter pub get
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Build artifact name
        id: vars
        shell: bash
        run: |
          branch="${GITHUB_REF_NAME//\//-}"
          short_sha="${GITHUB_SHA::7}"
          APK_PATH="build/app/outputs/flutter-apk/app-release.apk"
          DEST_PATH="build/app/outputs/flutter-apk/MordechaiusMaximus-${branch}-${short_sha}.apk"
          cp "${APK_PATH}" "${DEST_PATH}"
          echo "APK_PATH=${DEST_PATH}" >> "$GITHUB_ENV"
          echo "artifact_name=apk-${branch}-${short_sha}" >> "$GITHUB_OUTPUT"

      - name: Upload artifact to GitHub
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.vars.outputs.artifact_name }}
          path: ${{ env.APK_PATH }}
          if-no-files-found: error
          retention-days: 14
