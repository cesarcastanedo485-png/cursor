name: Build APK and Upload to GitHub

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Write Android signing files
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -n "${ANDROID_KEYSTORE_BASE64}" ] && [ -n "${ANDROID_KEYSTORE_PASSWORD}" ] && [ -n "${ANDROID_KEY_ALIAS}" ] && [ -n "${ANDROID_KEY_PASSWORD}" ]; then
            # Keep pipeline resilient: if signing setup fails, continue and let Gradle fallback to debug signing.
            if echo "${ANDROID_KEYSTORE_BASE64}" | base64 -d > android/upload-keystore.jks; then
              printf "storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=upload-keystore.jks\n" \
                "${ANDROID_KEYSTORE_PASSWORD}" \
                "${ANDROID_KEY_PASSWORD}" \
                "${ANDROID_KEY_ALIAS}" > android/key.properties
              echo "Release signing configured."
            else
              echo "Signing secret decode failed. Continuing without release keystore."
              rm -f android/upload-keystore.jks android/key.properties
            fi
          else
            echo "Signing secrets missing. Build may fallback to debug signing based on project config."
          fi

      - name: Flutter pub get
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Rename APK and set outputs
        id: vars
        shell: bash
        run: |
          short_sha="${GITHUB_SHA::7}"
          apk_path="build/app/outputs/flutter-apk/MordechaiusMaximus-${short_sha}.apk"
          cp "build/app/outputs/flutter-apk/app-release.apk" "${apk_path}"
          echo "short_sha=${short_sha}" >> "$GITHUB_OUTPUT"
          echo "apk_path=${apk_path}" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ steps.vars.outputs.short_sha }}
          path: ${{ steps.vars.outputs.apk_path }}
          if-no-files-found: error
          retention-days: 14

      - name: Publish latest APK to GitHub Release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-apk
          name: Latest APK
          prerelease: true
          body: |
            Automated APK build from commit `${{ github.sha }}`.
            Download the `MordechaiusMaximus-*.apk` asset below to install on Android.
          files: ${{ steps.vars.outputs.apk_path }}
